<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Price Aggregator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .dot.error { background: #ef4444; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e2130;
      border: 0.5px solid #2d3148;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #4a5080; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .symbol {
      font-size: 15px;
      font-weight: 500;
      color: #f8fafc;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #2d3148;
      color: #94a3b8;
    }

    .price {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }

    .sources {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 0.5px solid #2d3148;
    }

    .source-pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #161926;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-pill span {
      color: #94a3b8;
      font-weight: 500;
    }

    .updated {
      font-size: 12px;
      color: #475569;
      margin-top: 0.5rem;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: #475569;
    }

    .empty p { margin-top: 0.5rem; font-size: 13px; }

    .error-banner {
      background: #1e1215;
      border: 0.5px solid #3f1f24;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: #f87171;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Crypto aggregator</h1>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">connecting...</span>
    </div>
  </header>

  <div class="error-banner" id="error-banner"></div>

  <div class="grid" id="grid">
    <div class="empty">
      <div style="font-size:14px; color:#64748b;">Waiting for data...</div>
      <p>Make sure the backend is running on <code style="color:#94a3b8">localhost:8080</code></p>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8080/prices';
    const POLL_INTERVAL = 3000;

    const grid = document.getElementById('grid');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const errorBanner = document.getElementById('error-banner');

    function setStatus(ok, text) {
      dot.className = ok ? 'dot' : 'dot error';
      statusText.textContent = text;
    }

    function showError(msg) {
      errorBanner.style.display = 'block';
      errorBanner.textContent = msg;
    }

    function hideError() {
      errorBanner.style.display = 'none';
    }

    function formatPrice(price) {
      if (price >= 1000) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (price >= 1) return '$' + price.toFixed(4);
      return '$' + price.toFixed(6);
    }

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 5) return 'just now';
      if (diff < 60) return diff + 's ago';
      return Math.floor(diff / 60) + 'm ago';
    }

    function render(data) {
      if (!data || Object.keys(data).length === 0) {
        grid.innerHTML = '<div class="empty"><div style="font-size:14px;color:#64748b;">No data yet</div><p>Fetchers may still be warming up</p></div>';
        return;
      }

      grid.innerHTML = Object.entries(data).map(([symbol, info]) => {
        const sourcePills = Object.entries(info.sources || {}).map(([name, price]) =>
          `<div class="source-pill">${name} <span>${formatPrice(price)}</span></div>`
        ).join('');

        return `
          <div class="card">
            <div class="card-header">
              <div class="symbol">${symbol}</div>
              <div class="badge">${Object.keys(info.sources || {}).length} sources</div>
            </div>
            <div class="price">${formatPrice(info.average)}</div>
            <div class="updated">avg · updated ${timeAgo(info.updated_at)}</div>
            ${sourcePills ? `<div class="sources">${sourcePills}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    async function poll() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        hideError();
        setStatus(true, 'live · updates every 3s');
        render(data);
      } catch (err) {
        setStatus(false, 'disconnected');
        showError(`Cannot reach ${API_URL} — is the backend running? (${err.message})`);
      }
    }

    poll();
    setInterval(poll, POLL_INTERVAL);
    setInterval(() => { if (grid.querySelector('.card')) render(window._lastData || {}); }, 10000);

    const _origRender = render;
    window.render = (data) => { window._lastData = data; _origRender(data); };
  </script>
</body>
</html>
